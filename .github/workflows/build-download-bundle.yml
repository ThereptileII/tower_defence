name: Build standalone download bundle

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-download-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone and download bundle
        run: npm run build:bundle

      - name: Upload download bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontier-bastion-download-bundle
          path: dist/download-bundle
          if-no-files-found: error

      - name: Upload standalone html artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontier-bastion-standalone
          path: frontier-bastion-standalone.html
          if-no-files-found: error
