name: Build standalone artifact

on:
  push:
    branches: ["main", "master", "work"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare standalone artifact
        run: |
          test -f dist/index.html
          cp dist/index.html dist/frontier-bastion-standalone.html

      - name: Validate standalone HTML (no external js/css references)
        run: |
          ART=dist/frontier-bastion-standalone.html
          test -f "$ART"
          if grep -Eq '<script[^>]+src="(?!data:)' "$ART"; then
            echo "Found external script src in $ART"
            exit 1
          fi
          if grep -Eq '<link[^>]+rel="stylesheet"[^>]+href="(?!data:)' "$ART"; then
            echo "Found external stylesheet href in $ART"
            exit 1
          fi

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontier-bastion-standalone
          path: dist/frontier-bastion-standalone.html
          if-no-files-found: error
