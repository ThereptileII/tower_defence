name: Build single-file app

on:
  push:
    branches: ["main", "master", "work"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify dist/index.html exists
        run: test -f dist/index.html

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: tower-defence-single-page
          path: dist/index.html
          if-no-files-found: error
